name: Release
on:
  push:
    tags: [ 'v*.*.*' ]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Login GHCR
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image meta
        id: meta
        run: |
          echo "IMAGE=${{ vars.GHCR_IMAGE || 'ghcr.io/cursorvers/jgrants-mcp' }}" >> $GITHUB_OUTPUT
          echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.IMAGE }}:${{ steps.meta.outputs.TAG }},${{ steps.meta.outputs.IMAGE }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@c85d0e205a72a294fe064f618a87dbac13084086

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        continue-on-error: true
        id: sign
        run: |
          # Retry logic for cosign signing (handles transient TUF errors)
          MAX_RETRIES=3
          RETRY_DELAY=5
          
          sign_image() {
            local image=$1
            local retry_count=0
            
            while [ $retry_count -lt $MAX_RETRIES ]; do
              if cosign sign --yes "$image"; then
                echo "✅ Successfully signed $image"
                return 0
              else
                retry_count=$((retry_count + 1))
                if [ $retry_count -lt $MAX_RETRIES ]; then
                  echo "⚠️ Signing failed, retrying in ${RETRY_DELAY}s (attempt $retry_count/$MAX_RETRIES)..."
                  sleep $RETRY_DELAY
                else
                  echo "❌ Failed to sign $image after $MAX_RETRIES attempts"
                  return 1
                fi
              fi
            done
          }
          
          # Sign both tags
          sign_image "${{ steps.meta.outputs.IMAGE }}:${{ steps.meta.outputs.TAG }}" || exit 1
          sign_image "${{ steps.meta.outputs.IMAGE }}:latest" || exit 1
      
      - name: Check signing status
        if: steps.sign.outcome == 'failure'
        run: |
          echo "⚠️ Container image signing failed, but the image was successfully built and pushed."
          echo "This may be due to transient issues with Sigstore's TUF metadata service."
          echo "The image is available at: ${{ steps.meta.outputs.IMAGE }}:${{ steps.meta.outputs.TAG }}"
          echo "You can manually sign it later or retry the workflow."
