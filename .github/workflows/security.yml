name: Security
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '15 5 * * 3'

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4
        continue-on-error: true
        id: codeql-analyze
      - name: Check CodeQL results
        if: steps.codeql-analyze.outcome == 'failure'
        run: |
          echo "⚠️ CodeQL analysis failed. This may be due to GitHub Advanced Security not being enabled."
          echo "To enable CodeQL, upgrade to GitHub Pro or GitHub Enterprise and enable Advanced Security."
          echo "For now, continuing with other security checks..."

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
      - uses: actions/dependency-review-action@0efb1d1d84fc9633afcdaad14c485cbbc90ef46c
        with:
          fail-on-severity: high
