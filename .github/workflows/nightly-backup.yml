name: Nightly backup
on:
  schedule:
    - cron: '0 18 * * *'

permissions:
  contents: read

jobs:
  archive-logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Prepare backup metadata
        run: |
          mkdir -p artifacts
          echo "backup run ${{ github.run_id }} ($(date -u))" > artifacts/backup-${{ github.run_id }}.txt

      - name: Upload archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: nightly-backup-${{ github.run_id }}
          path: artifacts/*.txt
          retention-days: 30
